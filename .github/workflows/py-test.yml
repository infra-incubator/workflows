name: Python Tests

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: '3.12'
        description: 'Python version to use'
      test_path:
        required: false
        type: string
        default: 'tests/'
        description: 'Path to test directory or file'
      coverage_threshold:
        required: false
        type: number
        default: 0
        description: 'Minimum coverage percentage (0 to disable)'
      pytest_args:
        required: false
        type: string
        default: ''
        description: 'Additional pytest arguments'
    outputs:
      tests_passed:
        description: 'Whether tests passed'
        value: ${{ jobs.test.outputs.tests_passed }}

jobs:
  test:
    name: Python Tests
    runs-on: [ self-hosted, k3s, infra ]
    outputs:
      tests_passed: ${{ steps.result.outputs.result }}
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install ${{ inputs.python_version }}

      - name: Install dependencies
        run: |
          uv sync --dev
          uv pip install pytest-cov

      - name: Run tests with coverage
        run: |
          uv run pytest ${{ inputs.test_path }} \
            -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            ${{ inputs.pytest_args }}

      - name: Check coverage threshold
        if: ${{ inputs.coverage_threshold > 0 }}
        run: |
          uv run coverage report --fail-under=${{ inputs.coverage_threshold }}

      - name: Set result
        id: result
        if: success()
        run: echo "result=true" >> $GITHUB_OUTPUT
